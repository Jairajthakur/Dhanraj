name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ✅ Cache node_modules using package.json hash
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # ✅ Cache Gradle — biggest time saver
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ✅ Cache .expo folder
      - name: Cache Expo
        uses: actions/cache@v4
        with:
          path: .expo
          key: ${{ runner.os }}-expo-${{ hashFiles('app.json') }}
          restore-keys: |
            ${{ runner.os }}-expo-

      - name: Configure Gradle memory
        run: |
          mkdir -p ~/.gradle
          cat >> ~/.gradle/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.configureondemand=true
          kotlin.daemon.jvm.options=-Xmx4g -XX:MaxMetaspaceSize=1g
          kotlin.incremental=true
          EOF

      # ✅ FIXED: npm install instead of npm ci
      - name: Install dependencies
        run: |
          npm config set legacy-peer-deps true
          npm install --legacy-peer-deps
          npm install nanoid@3.3.7 --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_PUBLIC_API_URL: https://dhanraj-production.up.railway.app

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            --no-daemon \
            --parallel \
            --build-cache \
            --stacktrace
        env:
          EXPO_PUBLIC_API_URL: https://dhanraj-production.up.railway.app
          GRADLE_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=1g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dhanraj-release-${{ github.run_number }}.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
