name: Build Android APK
on:
  workflow_dispatch:
env:
  EXPO_PUBLIC_API_URL: https://dhanraj-production.up.railway.app
jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache node_modules
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Expo
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: .expo
          key: ${{ runner.os }}-expo-${{ hashFiles('app.config.js') }}
          restore-keys: |
            ${{ runner.os }}-expo-

      - name: Configure Gradle memory
        run: |
          mkdir -p ~/.gradle
          cat >> ~/.gradle/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.configureondemand=true
          kotlin.daemon.jvm.options=-Xmx4g -XX:MaxMetaspaceSize=1g
          kotlin.incremental=true
          EOF

      - name: Install dependencies
        run: |
          npm config set legacy-peer-deps true
          npm install --legacy-peer-deps
          npm install nanoid@3.3.7 --legacy-peer-deps --save-exact

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_PUBLIC_API_URL: https://dhanraj-production.up.railway.app

      # Cache Gradle AFTER prebuild so android/ gradle files exist for hashing
      - name: Cache Gradle
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Verify android folder exists
        run: |
          ls -la android/
          ls -la android/app/

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          # Generate react-native-webview JNI codegen before CMake configure runs
          ./gradlew :react-native-webview:generateCodegenArtifactsFromSchema \
            --no-daemon \
            --build-cache
          ./gradlew assembleRelease \
            --no-daemon \
            --parallel \
            --build-cache \
            --stacktrace \
            -Pandroid.enableJetifier=true
        env:
          GRADLE_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=1g"

      - name: Find APK
        run: find android/app/build/outputs/apk -name "*.apk" | head -20

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: dhanraj-release-${{ github.run_number }}.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload Debug APK (fallback on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dhanraj-debug-${{ github.run_number }}.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
