name: Deploy Expo Web to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔥 FIX: Node 20 (VERY IMPORTANT)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ✅ Stable install
      - name: Install dependencies
        run: |
          npm config set legacy-peer-deps true
          npm install

      # ✅ Nanoid fix
      - name: Fix nanoid issue
        run: npm install nanoid@3.3.7

      # ✅ Build
      - name: Build Expo Web
        run: npx expo export --platform web

      # ✅ Upload
      - name: Upload build
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
