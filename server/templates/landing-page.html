<!DOCTYPE html>
<html lang="en">
<head>

  <title>Dhanraj Enterprises API</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    .card { background: #1e293b; padding: 40px; border-radius: 12px; text-align: center; max-width: 400px; width: 90%; }

    .badge { background: #22c55e; color: white; padding: 6px 16px; border-radius: 20px; font-size: 14px; }
    a { color: #6366f1; text-decoration: none; display: block; margin-top: 20px; font-size: 14px; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Dhanraj Enterprises</h1>
